<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>AI Quiz Arena</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
}

.option{
display:block;
width:300px;
margin:10px auto;
padding:10px;
background:#333;
border:none;
color:white;
}

.correct{
background:green;
}

.wrong{
background:red;
}

</style>
</head>
<body>

<h1 id="title">AI QUIZ ARENA</h1>

<div id="setup">

<h3>Modo</h3>

<button onclick="startGame('solo')">Jogador único</button>
<button onclick="startGame('duelo')">Duelo</button>

<br><br>

<input id="player1" placeholder="Jogador 1" value="Gepeteta">

<input id="player2" placeholder="Jogador 2" value="Mano Google">

</div>

<div id="game" style="display:none">

<h2 id="turn"></h2>

<h3 id="question"></h3>

<div id="options"></div>

<h3 id="score"></h3>

<button onclick="nextQuestion()">Próxima</button>

</div>

<script>

// BASE DE CONHECIMENTO

const base = [

{
question:"Qual foi o primeiro partido de Aécio Neves?",
options:["PSDB","PMDB","PFL","PTB"],
correct:1
},

{
question:"Quem venceu a Copa Pistão em Carros 1?",
options:["Relâmpago McQueen","Chick Hicks","The King","Guido"],
correct:1
},

{
question:"Qual foi o primeiro Pokémon criado?",
options:["Bulbasaur","Rhydon","Mew","Pikachu"],
correct:1
},

{
question:"Qual é o estádio do Goiatuba?",
options:[
Estádio Divino Garcia Rosa,
Mineirão,
Serra Dourada,
Morumbi
],
correct:0
},

{
question:"Quando Ciro Gomes foi candidato a presidente?",
options:[
"1998, 2002, 2018, 2022",
"1994, 1998, 2014",
"2006, 2010, 2018",
"2002, 2010, 2014"
],
correct:0
}

];

let mode
let currentPlayer=1
let score1=0
let score2=0
let currentQuestion

function startGame(m){

mode=m

document.getElementById("setup").style.display="none"
document.getElementById("game").style.display="block"

nextQuestion()

}

function nextQuestion(){

const q = base[Math.floor(Math.random()*base.length)]

currentQuestion=q

document.getElementById("question").innerText=q.question

const optionsDiv=document.getElementById("options")

optionsDiv.innerHTML=""

q.options.forEach((opt,i)=>{

const btn=document.createElement("button")

btn.className="option"

btn.innerText=opt

btn.onclick=()=>answer(i,btn)

optionsDiv.appendChild(btn)

})

updateUI()

}

function answer(i,btn){

const correct=currentQuestion.correct

const buttons=document.querySelectorAll(".option")

buttons.forEach(b=>b.disabled=true)

if(i===correct){

btn.classList.add("correct")

if(mode==="solo") score1++

if(mode==="duelo"){

if(currentPlayer===1) score1++
else score2++

}

}else{

btn.classList.add("wrong")

buttons[correct].classList.add("correct")

}

updateUI()

}

function updateUI(){

let p1=document.getElementById("player1").value||"Jogador1"
let p2=document.getElementById("player2").value||"Jogador2"

document.getElementById("score").innerText=
p1+" "+score1+" x "+score2+" "+p2

if(mode==="duelo"){

document.getElementById("turn").innerText=
"Turno de "+(currentPlayer===1?p1:p2)

currentPlayer=currentPlayer===1?2:1

}else{

document.getElementById("turn").innerText=""

}

}

</script>

</body>
</html>
