<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copa pIAstão</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #111827 0%, #1f2937 100%);
      color: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .game {
      width: 100%;
      max-width: 920px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }
    .subtitle {
      margin: 0 0 24px;
      color: #d1d5db;
    }
    .scoreboard {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .name {
      font-size: 1rem;
      color: #d1d5db;
      margin-bottom: 8px;
    }
    .points {
      font-size: 3rem;
      font-weight: 700;
    }
    .versus {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fbbf24;
    }
    .question-box {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .question-label {
      font-size: 0.95rem;
      color: #93c5fd;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .question {
      font-size: 1.35rem;
      line-height: 1.5;
      min-height: 64px;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    button {
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    button:hover { transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    .gpt { background: #22c55e; color: #06240f; }
    .google { background: #60a5fa; color: #081a33; }
    .next { background: #fbbf24; color: #2a1700; }
    .reset { background: #f87171; color: #2b0909; width: 100%; margin-top: 10px; }
    .log {
      background: rgba(0,0,0,0.22);
      border-radius: 16px;
      padding: 16px;
      max-height: 240px;
      overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .log h2 {
      margin: 0 0 12px;
      font-size: 1rem;
    }
    .log-entry {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      margin-bottom: 8px;
      color: #e5e7eb;
      line-height: 1.4;
    }
    .winner {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      background: rgba(251,191,36,0.12);
      border: 1px solid rgba(251,191,36,0.35);
      color: #fde68a;
      display: none;
    }
    .small {
      color: #9ca3af;
      font-size: 0.92rem;
      margin-top: 10px;
    }
    @media (max-width: 720px) {
      .scoreboard, .controls { grid-template-columns: 1fr; }
      .versus { text-align: center; }
      .points { font-size: 2.4rem; }
      .question { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="game">
    <h1>🏁 Copa pIAstão</h1>
    <p class="subtitle">Marque pontos para o Gepeteta ou para o Mano Google e avance pelas perguntas.</p>

    <div class="scoreboard">
      <div class="card">
        <div class="name">Gepeteta</div>
        <div class="points" id="gptScore">0</div>
      </div>
      <div class="versus">VS</div>
      <div class="card">
        <div class="name">Mano Google</div>
        <div class="points" id="googleScore">0</div>
      </div>
    </div>

    <div class="question-box">
      <div class="question-label" id="roundLabel">Pergunta 1</div>
      <div class="question" id="questionText"></div>
    </div>

    <div class="controls">
      <button class="gpt" id="pointGpt">Ponto para Gepeteta</button>
      <button class="google" id="pointGoogle">Ponto para Mano Google</button>
      <button class="next" id="nextQuestion">Próxima pergunta</button>
    </div>

    <div class="log">
      <h2>Histórico</h2>
      <div id="logEntries"></div>
    </div>

    <div class="winner" id="winnerBox"></div>

    <button class="reset" id="resetGame">Reiniciar torneio</button>
    <div class="small">Dica: você pode editar o array <strong>questions</strong> no código para colocar suas próprias perguntas.</div>
  </div>

  <script>
    const questions = [
      'Qual o estádio do Goiatuba?',
      'Foi criado um partido recentemente. Qual é?',
      'Quais são os pré-candidatos a presidente em 2026?',
      'Crie uma pergunta curta para o maninho.',
      'Sabe o DeepSeek? Mande um recado para ele.',
      'Quando lançou o último vídeo de Guto Zacarias?',
      'Dê apelidos para 10 IAs.',
      'Quando Ciro Gomes foi candidato a presidente?',
      'Quem sou eu?',
      'Qual foi o primeiro partido de Aécio Neves?'
    ];

    let currentQuestion = 0;
    let gptScore = 0;
    let googleScore = 0;

    const gptScoreEl = document.getElementById('gptScore');
    const googleScoreEl = document.getElementById('googleScore');
    const roundLabelEl = document.getElementById('roundLabel');
    const questionTextEl = document.getElementById('questionText');
    const logEntriesEl = document.getElementById('logEntries');
    const winnerBoxEl = document.getElementById('winnerBox');

    function renderQuestion() {
      if (currentQuestion < questions.length) {
        roundLabelEl.textContent = `Pergunta ${currentQuestion + 1}`;
        questionTextEl.textContent = questions[currentQuestion];
      } else {
        roundLabelEl.textContent = 'Fim da Copa pIAstão';
        questionTextEl.textContent = 'Todas as perguntas acabaram. Veja quem venceu abaixo.';
        showWinner();
      }
    }

    function updateScore() {
      gptScoreEl.textContent = gptScore;
      googleScoreEl.textContent = googleScore;
    }

    function addLog(text) {
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.textContent = text;
      logEntriesEl.prepend(entry);
    }

    function awardPoint(player) {
      if (currentQuestion >= questions.length) return;

      const question = questions[currentQuestion];

      if (player === 'gpt') {
        gptScore++;
        addLog(`Pergunta ${currentQuestion + 1}: ponto para Gepeteta — ${question}`);
      } else {
        googleScore++;
        addLog(`Pergunta ${currentQuestion + 1}: ponto para Mano Google — ${question}`);
      }

      updateScore();
      currentQuestion++;
      renderQuestion();
    }

    function nextQuestion() {
      if (currentQuestion >= questions.length) return;
      addLog(`Pergunta ${currentQuestion + 1}: pulada — ${questions[currentQuestion]}`);
      currentQuestion++;
      renderQuestion();
    }

    function showWinner() {
      winnerBoxEl.style.display = 'block';
      if (gptScore > googleScore) {
        winnerBoxEl.textContent = `🏆 Gepeteta venceu a Copa pIAstão por ${gptScore} x ${googleScore}!`;
      } else if (googleScore > gptScore) {
        winnerBoxEl.textContent = `🏆 Mano Google venceu a Copa pIAstão por ${googleScore} x ${gptScore}!`;
      } else {
        winnerBoxEl.textContent = `🤝 Empate total: ${gptScore} x ${googleScore}. Vai ter revanche!`;
      }
    }

    function resetGame() {
      currentQuestion = 0;
      gptScore = 0;
      googleScore = 0;
      logEntriesEl.innerHTML = '';
      winnerBoxEl.style.display = 'none';
      updateScore();
      renderQuestion();
      addLog('Novo torneio iniciado.');
    }

    document.getElementById('pointGpt').addEventListener('click', () => awardPoint('gpt'));
    document.getElementById('pointGoogle').addEventListener('click', () => awardPoint('google'));
    document.getElementById('nextQuestion').addEventListener('click', nextQuestion);
    document.getElementById('resetGame').addEventListener('click', resetGame);

    updateScore();
    renderQuestion();
    addLog('Copa pIAstão iniciada.');
  </script>
</body>
</html>
